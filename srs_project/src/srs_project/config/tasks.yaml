cultural_analysis_task:
  description: >
    Изучи предоставленные данные о культурных традициях страны {origin_country}. 
    Сформулируй 5 советов для студентов, как вести себя в Казахстане, учитывая их бэкграунд.
  expected_output: >
    Список рекомендаций по межкультурной адаптации на русском языке.
  agent: cultural_analyst

guide_creation_task:
  description: >
    Возьми список инфраструктуры {campus_infrastructure} и рекомендации от культурного аналитика. 
    Составь подробный гид, который включает: куда пойти в первый день, где найти привычную еду или аналоги, 
    и как пользоваться услугами кампуса.
  expected_output: >
    Полноценный адаптивный гид в формате Markdown.
  agent: infrastructure_guide